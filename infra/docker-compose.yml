version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: hyperlocal_postgres
    environment:
      POSTGRES_DB: hyperlocal
      POSTGRES_USER: hyperlocal_user
      POSTGRES_PASSWORD: hyperlocal_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hyperlocal_redis
    ports:
      - '6379:6379'

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: hyperlocal_search
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: dev_master_key

volumes:
  pgdata: